<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>html360</title>
    <link rel="icon" type="image/svg+xml" href="{{FAVICON}}" />
    <style>{{CSS}}</style>
  </head>
  <body>
    <div id="loader"></div>
    <div id="ui-layer">
      <div id="panorama"></div>
      <div id="main-menu" class="menu hidden">
        <button id="main-menu-fullscreen" class="button">Fullscreen</button>
        <button id="main-menu-save" class="button">Save View</button>
        <button id="main-menu-edit-mode" class="button">Switch to Editor</button>
        <div class="menu-footer">
          <a href="https://www.npmjs.com/package/html360" target="_blank" class="menu-footer-link">html360</a>
          <a href="https://pannellum.org/" target="_blank" class="menu-footer-link">pannellum</a>
          <a href="https://hugin.sourceforge.io/" target="_blank" class="menu-footer-link">hugin</a>
          <a href="https://sharp.pixelplumbing.com/" target="_blank" class="menu-footer-link">sharp</a>
        </div>
      </div>
      <div id="edit-mode-actinos" class="edit-mode-actinos hidden">

        </button>
        <button id="edit-mode-actinos-add-info" class=" button" data-tooltip="Add Info">
          <svg width="32px" height="32px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M12 16.75C11.8019 16.7474 11.6126 16.6676 11.4725 16.5275C11.3324 16.3874 11.2526 16.1981 11.25 16V11C11.25 10.8011 11.329 10.6103 11.4697 10.4697C11.6103 10.329 11.8011 10.25 12 10.25C12.1989 10.25 12.3897 10.329 12.5303 10.4697C12.671 10.6103 12.75 10.8011 12.75 11V16C12.7474 16.1981 12.6676 16.3874 12.5275 16.5275C12.3874 16.6676 12.1981 16.7474 12 16.75Z" fill="#000000"></path> <path d="M12 9.25C11.8019 9.24741 11.6126 9.16756 11.4725 9.02747C11.3324 8.88737 11.2526 8.69811 11.25 8.5V8C11.25 7.80109 11.329 7.61032 11.4697 7.46967C11.6103 7.32902 11.8011 7.25 12 7.25C12.1989 7.25 12.3897 7.32902 12.5303 7.46967C12.671 7.61032 12.75 7.80109 12.75 8V8.5C12.7474 8.69811 12.6676 8.88737 12.5275 9.02747C12.3874 9.16756 12.1981 9.24741 12 9.25Z" fill="#000000"></path> <path d="M12 21C10.22 21 8.47991 20.4722 6.99987 19.4832C5.51983 18.4943 4.36628 17.0887 3.68509 15.4442C3.0039 13.7996 2.82567 11.99 3.17294 10.2442C3.5202 8.49836 4.37737 6.89472 5.63604 5.63604C6.89472 4.37737 8.49836 3.5202 10.2442 3.17294C11.99 2.82567 13.7996 3.0039 15.4442 3.68509C17.0887 4.36628 18.4943 5.51983 19.4832 6.99987C20.4722 8.47991 21 10.22 21 12C21 14.387 20.0518 16.6761 18.364 18.364C16.6761 20.0518 14.387 21 12 21ZM12 4.5C10.5166 4.5 9.0666 4.93987 7.83323 5.76398C6.59986 6.58809 5.63856 7.75943 5.07091 9.12988C4.50325 10.5003 4.35473 12.0083 4.64411 13.4632C4.9335 14.918 5.64781 16.2544 6.6967 17.3033C7.7456 18.3522 9.08197 19.0665 10.5368 19.3559C11.9917 19.6453 13.4997 19.4968 14.8701 18.9291C16.2406 18.3614 17.4119 17.4001 18.236 16.1668C19.0601 14.9334 19.5 13.4834 19.5 12C19.5 10.0109 18.7098 8.10323 17.3033 6.6967C15.8968 5.29018 13.9891 4.5 12 4.5Z" fill="#000000"></path> </g></svg>
        </button>
        <button id="edit-mode-actinos-copy-orientation" class=" button" data-tooltip="Copy Orientation URL Params">
          <svg width="32px" height="32px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M22 12C22 12 18.3636 19 12 19C5.63636 19 2 12 2 12C2 12 5.63636 5 12 5C14.8779 5 17.198 6.43162 18.8762 8M9 12C9 13.6569 10.3431 15 12 15C13.6569 15 15 13.6569 15 12C15 10.3431 13.6569 9 12 9" stroke="#000000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path> </g></svg>
        </button>
      </div>
      <div id="hotspot" class="hidden">
        <div class="hotspot-modal">          
          <div id="hotspot-header">
            Points of Interest
          </div>
          <div class="hotspot-content">
            <div class="hotspot-field">
              <label for="hotspot-text" class="label">Text</label>
              <input id="hotspot-text" type="text" class="input" placeholder="Enter name...">
            </div>            
            <div class="hotspot-field">
              <label class="label" for="hotspot-url">URL</label>
              <div>
                <input 
                  type="text" 
                  class="input" 
                  id="hotspot-url" 
                  list="hotspot-urls" 
                  placeholder="Type or select a url..."
                  autocomplete="off"
                >
                <datalist id="hotspot-urls">
                </datalist>
              </div>
              <label class="checkbox">
                <input type="checkbox" id="hotspot-open-new-tab">
                <span class="checkmark"></span>
                Open in new tab
              </label>
            </div>
          </div>
          <div class="hotspot-footer">
            <div class="hotspot-footer-buttons">
              <button id="hotspot-save" class="button">Save</button>
              <button id="hotspot-close" class="button secondary">Close</button>
            </div>
            <button id="hotspot-delete" class="button danger">Delete</button>
          </div>
        </div>
      </div>
      <div id="crosshair" class="hidden"></div>
    </div>
    <script id="panorama-data" type="text/plain">{{PANORAMA_DATA}}</script>
    <script id="state" type="application/json">{{STATE}}</script>
    <script>{{JS}}</script>
  </body>
</html>
